version: '1.0'
name: main-docker-deploy
displayName: main分支Docker自动部署
triggers:
  trigger: auto
  push:
    branches:
      precise:
        - main
variables:
  REGISTRY: ccr.ccs.tencentyun.com
  API_IMAGE_REPO: jacobshi/ultrafast_laser_process_decision_agent-api
  WEB_IMAGE_REPO: jacobshi/ultrafast_laser_process_decision_agent-web
  API_IMAGE_TAG: latest
  WEB_IMAGE_TAG: latest
  DEPLOY_DIR: /opt/ultrafast_laser_process_decision_agent
  global:
    - DOCKERHUB_PROXY
stages:
  - name: build
    displayName: 构建镜像
    strategy: naturally
    trigger: auto
    executor:
      - Jac0b_Shi
    steps:
      - step: build@docker
        name: build_api
        displayName: 构建API镜像
        type: cert
        certificate: 497be600-2dd4-013f-f852-16e62a0a3a44
        tag: ${API_IMAGE_REPO}:${API_IMAGE_TAG}
        dockerfile: ./apps/api/Dockerfile
        isCache: true
        processorType:
          - amd64
        parameter:
          API_BASE_IMAGE: ${DOCKERHUB_PROXY}/library/python:3.12-slim
          PIP_INDEX_URL: https://mirrors.tencent.com/pypi/simple
          PIP_TRUSTED_HOST: mirrors.tencent.com
        strategy: {}
      - step: build@docker
        name: build_web
        displayName: 构建Web镜像
        type: cert
        certificate: 497be600-2dd4-013f-f852-16e62a0a3a44
        tag: ${WEB_IMAGE_REPO}:${WEB_IMAGE_TAG}
        dockerfile: ./apps/web/Dockerfile
        isCache: true
        processorType:
          - amd64
        parameter:
          WEB_BASE_IMAGE: ${DOCKERHUB_PROXY}/library/node:22-alpine
        strategy: {}
  - name: deploy
    displayName: 部署到服务器
    strategy: naturally
    trigger: auto
    steps:
      - step: shell@agent
        name: deploy_compose
        displayName: Docker Compose 更新容器
        schedulerType: POOL
        hostGroupID:
          ID: server-shu
          hostID:
            - f9e02b10-3ae8-43a7-8a24-c089ad13f938
        scriptType: SH
        script:
          - |
            bash -Eeuo pipefail <<'BASH'
            : "${DEPLOY_DIR:=/opt/ultrafast_laser_process_decision_agent}"
            : "${REGISTRY:=ccr.ccs.tencentyun.com}"
            : "${DEPLOY_REPO_URL:=https://gitee.com/SHU-SPE-Sandrone/ultrafast_laser_process_decision_agent.git}"

            echo "==> current user"
            whoami
            id

            echo "==> prepare deploy directory: ${DEPLOY_DIR}"
            mkdir -p "${DEPLOY_DIR}"

            if [ ! -d "${DEPLOY_DIR}/.git" ]; then
              echo "deploy directory is empty or not a git repo, cloning..."
              if find "${DEPLOY_DIR}" -mindepth 1 -maxdepth 1 -print -quit | grep -q .; then
                BACKUP_DIR="${DEPLOY_DIR}.pre-git-$(date +%Y%m%d%H%M%S)"
                echo "existing non-git deploy directory found, moving it to ${BACKUP_DIR}"
                mv "${DEPLOY_DIR}" "${BACKUP_DIR}"
                mkdir -p "${DEPLOY_DIR}"
              fi
              git clone "${DEPLOY_REPO_URL}" "${DEPLOY_DIR}"
            fi

            cd "${DEPLOY_DIR}"

            echo "==> refresh compose file from main"
            git fetch origin main
            git reset --hard origin/main

            echo "==> validate deployment inputs"
            RAW_COUNT="$(find data/raw -maxdepth 1 -type f -name '*.xlsx' 2>/dev/null | wc -l | tr -d ' ')"
            if [ "${RAW_COUNT}" -eq 0 ]; then
              echo "ERROR: no raw Excel files found under data/raw; refusing to deploy empty dataset"
              exit 1
            fi
            grep -q 'LASER_DATA_DIR: /workspace/data' docker-compose.prod.yml
            grep -q './data:/workspace/data' docker-compose.prod.yml
            grep -q 'API_INTERNAL_URL:' docker-compose.prod.yml
            mkdir -p experiments/runs experiments/feedback_logs

            echo "==> docker compose version"
            if docker compose version >/dev/null 2>&1; then
              COMPOSE="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE="docker-compose"
            else
              echo "ERROR: neither docker compose nor docker-compose is available"
              exit 1
            fi

            echo "==> login to registry if credentials are provided"
            if [ -n "${TCR_REGISTRY_USERNAME:-}" ] && [ -n "${TCR_REGISTRY_PASSWORD:-}" ]; then
              echo "${TCR_REGISTRY_PASSWORD}" | docker login "${REGISTRY}" \
                -u "${TCR_REGISTRY_USERNAME}" \
                --password-stdin
            fi

            echo "==> verify compose file"
            test -f docker-compose.prod.yml
            $COMPOSE -f docker-compose.prod.yml config

            echo "==> pull images"
            $COMPOSE -f docker-compose.prod.yml pull

            echo "==> recreate services"
            $COMPOSE -f docker-compose.prod.yml up -d --remove-orphans

            echo "==> cleanup old images"
            docker image prune -f

            echo "==> deployment status"
            $COMPOSE -f docker-compose.prod.yml ps
            BASH
        strategy: {}





